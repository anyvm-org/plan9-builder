

# 9front release 11554 (2026-01-24), amd64, from the official prebuilt qcow2.
# "plan9" is the anyvm OS name; the actual distribution is 9front, the
# actively maintained Plan 9 fork (the 9p.io original has no viable
# remote-access story: SSH1-only server, unmaintained).
#
# NOTE for release bumps: files/exportfs-io.c is the full patched copy of
# sys/src/cmd/exportfs/io.c from THIS release's source tree. When adding a
# new release conf, refresh that file from the new tree and re-apply the
# anyvm errstr patch (see the comment block inside it).
VM_VHD_LINK="https://9front.org/iso/9front-11554.amd64.qcow2.gz"
VM_OS_NAME="plan9"
VM_RELEASE=11554
VM_SSH_PORT=2222

# Plan 9 has no sshd. The pipeline drives the guest over its telnetd
# (no-auth as glenda, reachable only through the slirp hostfwd on
# 127.0.0.1) and moves files over exportfs 9P.
#   VM_TRANSPORT=telnet -> build.py: hostfwd targets guest port 23,
#     _wait_telnet replaces _wait_ssh, shutdown goes over telnet, every
#     ssh-only stage skips.
#   VM_9P_PORT -> extra hostfwd to the guest's exportfs on 564.
VM_TRANSPORT=telnet
VM_9P_PORT=5640

# Serial console: the official image ships plan9.ini with console=0 already;
# hooks/host_prepareImage.sh adds nobootprompt+user so the first boot is
# fully unattended and lands in the rc shell on the serial line. rio cannot
# start (no framebuffer configured) and init falls back to rc -- that text
# console IS the build console.
VM_LOGIN_TAG="term%"
VM_USE_CONSOLE_BUILD=1
VM_NO_VNC_BUILD=1

# fshalt ends hjfs then halts the CPU without powering QEMU off;
# _wait_vm_down detects the "done halting" banner and force-kills QEMU.
VM_SHUTDOWN_CMD="fshalt"

# virtio-blk (the VM_DISK default) enumerates as /dev/sdF0 -- the device
# name hooks/host_prepareImage.sh bakes into nobootprompt. virtio-net is
# ether0 (ethervirtio).
VM_NIC=virtio

# 9front is light; 2G leaves hjfs cache headroom. Default SMP 2 is fine.
VM_MEMORY=2048

# Intentionally unset: VM_ROOT_PASSWORD / VM_INSTALL_CMD /
# VM_PRE_INSTALL_PKGS / VM_RSYNC_PKG / VM_SSHFS_PKG / VM_OPTS. Plan 9 has
# no package manager usable here and no ssh, so all of those stages skip.
# Sync at runtime = host mounts the guest's exportfs via Linux kernel 9p.
VM_SYNC_METHODS="9p"
